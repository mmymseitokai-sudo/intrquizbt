<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GM管理画面 - 早押し＆音源連動システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 15px; background: #2c3e50; color: #ecf0f1; touch-action: manipulation; }
        .container { max-width: 500px; margin: 0 auto; background: #34495e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { font-size: 1.1rem; font-weight: bold; color: #bdc3c7; margin-bottom: 15px; letter-spacing: 0.05em; }
        
        /* 音楽プレイヤーエリア */
        .audio-section { background: #2c3e50; border: 1px solid #4f5f6f; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; }
        .audio-title { font-size: 0.8rem; font-weight: bold; color: #95a5a6; margin-bottom: 8px; }
        #track-info { font-size: 0.95rem; color: #fff; font-weight: bold; margin-bottom: 10px; min-height: 2.4em; word-break: break-all; line-height: 1.3; }
        
        .audio-btn-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .audio-btn-row button { width: 31%; font-size: 0.85rem; padding: 8px; margin: 0; background: #7f8c8d; color: #fff; box-shadow: none; border-radius: 4px; }
        
        /* 手動操作・サビ再生コントロール */
        .audio-manual-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; border-top: 1px solid #4f5f6f; padding-top: 10px; }
        .audio-manual-row button { font-size: 0.85rem; padding: 8px; margin: 0; border-radius: 4px; border: none; font-weight: bold; }
        .control-sub-row { display: flex; justify-content: space-between; }
        #btn-manual-play { width: 48%; background: #2ecc71; color: white; }
        #btn-skip-back { width: 23%; background: #95a5a6; color: white; }
        #btn-skip-forward { width: 23%; background: #95a5a6; color: white; }
        
        /* 専用のサビ再生ボタン */
        #btn-sabi-play { width: 100%; background: #f39c12; color: white; font-size: 1rem; padding: 10px; }
        #btn-sabi-play:hover { background: #d35400; }

        /* プレイリスト表示エリア */
        #playlist-section { display: none; margin-top: 12px; border-top: 1px dashed #4f5f6f; padding-top: 12px; }
        #playlist-box { max-height: 130px; overflow-y: auto; border: 1px solid #4f5f6f; border-radius: 6px; background: #2c3e50; text-align: left; }
        .playlist-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid #34495e; font-size: 0.85rem; cursor: pointer; color: #bdc3c7; }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-item.active { background: #e05275; color: #fff; font-weight: bold; }
        .playlist-title { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; }
        .playlist-status { font-size: 0.75rem; color: #95a5a6; margin-right: 8px; white-space: nowrap; }
        .playlist-controls button { width: auto; display: inline-block; padding: 2px 8px; margin: 0 1px; font-size: 0.75rem; background: #7f8c8d; color: #fff; border-radius: 3px; border: none; font-weight: bold; }

        /* 順位リスト */
        #ranking-list { text-align: left; margin: 15px 0; min-height: 60px; border-top: 1px solid #4f5f6f; border-bottom: 1px solid #4f5f6f; padding: 5px 0; }
        .rank-item { padding: 8px 5px; border-bottom: 1px solid #34495e; font-size: 1rem; color: #7f8c8d; display: flex; justify-content: space-between; }
        .rank-item:last-child { border-bottom: none; }
        .rank-item.active { background: #e05275; color: #fff; font-weight: bold; border-radius: 4px; }
        .rank-item.ng { text-decoration: line-through; color: #555; }
        .rank-badge { font-weight: bold; margin-right: 10px; display: inline-block; width: 50px; }
        
        /* 操作ボタン */
        button { font-size: 1.1rem; padding: 12px; margin: 6px 0; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        #judge-area { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #4f5f6f; display: flex; justify-content: space-between; }
        
        #btn-ok { background: #2ecc71; color: white; width: 48%; }
        #btn-ng { background: #e74c3c; color: white; width: 48%; }
        
        #start { background: #3498db; color: white; }
        #lock { background: #f1c40f; color: #333; }
        #reset { background: #95a5a6; color: white; }
        
        button:active { opacity: 0.8; }
        .status-lamp { display: inline-block; width: 10px; height: 12px; border-radius: 50%; background: #ccc; margin-right: 8px; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GMコントロールパネル</h1>

        <!-- 音源読み込み・プレイヤー -->
        <div class="audio-section">
            <div class="audio-title">イントロ・サビ音源コントロール</div>
            <div id="track-info">音源未読込</div>
            
            <div class="audio-btn-row">
                <button onclick="document.getElementById('audio-files').click()">イントロ選択</button>
                <button onclick="document.getElementById('sabi-files').click()">サビ音源選択</button>
                <button onclick="changeTrack(1)">次の曲</button>
            </div>
            
            <!-- 手動操作・サビ再生コントロール -->
            <div class="audio-manual-row">
                <button id="btn-sabi-play">サビを再生</button>
                <div class="control-sub-row">
                    <button id="btn-skip-back">10s 戻る</button>
                    <button id="btn-manual-play">イントロ 再生</button>
                    <button id="btn-skip-forward">10s 進む</button>
                </div>
            </div>
            
            <input type="file" id="audio-files" multiple accept="audio/*" style="display:none">
            <input type="file" id="sabi-files" multiple accept="audio/*" style="display:none">

            <!-- プレイリスト -->
            <div id="playlist-section">
                <div class="audio-title">プレイリスト（順序変更・選択）</div>
                <div id="playlist-box"></div>
            </div>
        </div>

        <div id="ranking-list">
            <div style="text-align:center; color:#7f8c8d; line-height: 60px;">待機中</div>
        </div>

        <!-- 判定エリア -->
        <div id="judge-area">
            <button id="btn-ok">正解</button>
            <button id="btn-ng">不正解</button>
        </div>
        
        <button id="start">次の問題（イントロスタート）</button>
        <button id="lock">受付終了（ロック）</button>
        <button id="reset">全リセット（音楽停止）</button>

        <div style="margin-top:20px; color:#bdc3c7; font-size:0.75rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span id="lamp" class="status-lamp"></span>接続: <span id="conn-status">接続中</span>
            </div>
            <div>
                <label style="cursor:pointer;"><input type="checkbox" id="mute-toggle"> この端末で早押し音を出す</label>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGQBFnST2VjMmizssGall_Hk-mDXuwXis",
            authDomain: "hayaoshi--momo.firebaseapp.com",
            projectId: "hayaoshi--momo",
            storageBucket: "hayaoshi--momo.firebasestorage.app",
            messagingSenderId: "178861367734",
            appId: "1:178861367734:web:a3445a7c9d7e1757ede117"
        };

        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); } catch (e) {}

        const db = firebase.database();
        const ref = db.ref('quiz_room');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let musicPlayer = new Audio();
        let sabiPlayer = new Audio();
        
        let loadedTracks = [];
        let rawSabiTracks = [];
        let loadedSabiTracks = [];
        let currentTrackIndex = 0;
        let enableSound = false;

        document.getElementById('mute-toggle').addEventListener('change', (e) => {
            enableSound = e.target.checked;
        });

        document.getElementById('audio-files').addEventListener('change', (e) => {
            loadedTracks = Array.from(e.target.files);
            loadedTracks.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            currentTrackIndex = 0;
            pairSabiTracks();
            updateTrackDisplay();
            renderTrackList();
        });

        document.getElementById('sabi-files').addEventListener('change', (e) => {
            rawSabiTracks = Array.from(e.target.files);
            pairSabiTracks();
            updateTrackDisplay();
            renderTrackList();
        });

        function cleanName(name) {
            return name.toLowerCase()
                       .replace(/\.[^/.]+$/, "")
                       .replace(/intro|sabi|イントロ|サビ|clip|answer|music|曲/g, "")
                       .replace(/[^a-zA-Z0-9０-９ぁ-んァ-ヶ亜-熙]/g, "");
        }

        function getSimilarity(str1, str2) {
            const s1 = cleanName(str1);
            const s2 = cleanName(str2);
            if (s1 === s2) return 1.0;
            if (s1.includes(s2) || s2.includes(s1)) return 0.9;

            const getBigrams = (str) => {
                const bigrams = new Set();
                for (let i = 0; i < str.length - 1; i++) {
                    bigrams.add(str.substring(i, i + 2));
                }
                return bigrams;
            };
            const b1 = getBigrams(s1);
            const b2 = getBigrams(s2);
            if (b1.size === 0 || b2.size === 0) return 0;
            
            let intersection = 0;
            for (let ngram of b1) {
                if (b2.has(ngram)) intersection++;
            }
            return (2.0 * intersection) / (b1.size + b2.size);
        }

        function pairSabiTracks() {
            if (loadedTracks.length === 0 || rawSabiTracks.length === 0) {
                loadedSabiTracks = new Array(loadedTracks.length).fill(null);
                return;
            }

            loadedSabiTracks = loadedTracks.map(introFile => {
                let bestMatch = null;
                let highestScore = -1;

                rawSabiTracks.forEach(sabiFile => {
                    const score = getSimilarity(introFile.name, sabiFile.name);
                    if (score > highestScore) {
                        highestScore = score;
                        bestMatch = sabiFile;
                    }
                });

                return (highestScore > 0.15) ? bestMatch : null;
            });
        }

        function updateTrackDisplay() {
            const info = document.getElementById('track-info');
            if (loadedTracks.length > 0) {
                const file = loadedTracks[currentTrackIndex];
                const matchedSabi = loadedSabiTracks[currentTrackIndex];
                const hasSabi = matchedSabi ? `読込済 (${matchedSabi.name.substring(0, 15)}...)` : "未読込";
                info.innerHTML = `[${currentTrackIndex + 1}/${loadedTracks.length}] ${file.name}<br>サビ音源: ${hasSabi}`;
            } else {
                info.innerText = "音源未読込";
            }
        }

        function renderTrackList() {
            const section = document.getElementById('playlist-section');
            const box = document.getElementById('playlist-box');
            if (loadedTracks.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            let html = '';
            loadedTracks.forEach((file, i) => {
                const isActive = (i === currentTrackIndex) ? 'active' : '';
                const hasSabiText = loadedSabiTracks[i] ? "サビあり" : "サビなし";
                html += `
                    <div class="playlist-item ${isActive}" onclick="selectTrack(${i})">
                        <div class="playlist-title">${i + 1}. ${file.name}</div>
                        <div class="playlist-status">${hasSabiText}</div>
                        <div class="playlist-controls">
                            <button onclick="moveTrackUp(${i}, event)">↑</button>
                            <button onclick="moveTrackDown(${i}, event)">↓</button>
                        </div>
                    </div>
                `;
            });
            box.innerHTML = html;
        }

        window.selectTrack = function(index) {
            musicPlayer.pause();
            sabiPlayer.pause();
            currentTrackIndex = index;
            updateTrackDisplay();
            renderTrackList();
        }

        window.moveTrackUp = function(index, event) {
            event.stopPropagation();
            if (index === 0) return;
            const temp = loadedTracks[index];
            loadedTracks[index] = loadedTracks[index - 1];
            loadedTracks[index - 1] = temp;
            
            if (loadedSabiTracks[index] || loadedSabiTracks[index - 1]) {
                const tempSabi = loadedSabiTracks[index];
                loadedSabiTracks[index] = loadedSabiTracks[index - 1];
                loadedSabiTracks[index - 1] = tempSabi;
            }
            
            if (currentTrackIndex === index) currentTrackIndex--;
            else if (currentTrackIndex === index - 1) currentTrackIndex++;
            updateTrackDisplay();
            renderTrackList();
        }

        window.moveTrackDown = function(index, event) {
            event.stopPropagation();
            if (index === loadedTracks.length - 1) return;
            const temp = loadedTracks[index];
            loadedTracks[index] = loadedTracks[index + 1];
            loadedTracks[index + 1] = temp;
            
            if (loadedSabiTracks[index] || loadedSabiTracks[index + 1]) {
                const tempSabi = loadedSabiTracks[index];
                loadedSabiTracks[index] = loadedSabiTracks[index + 1];
                loadedSabiTracks[index + 1] = tempSabi;
            }
            
            if (currentTrackIndex === index) currentTrackIndex++;
            else if (currentTrackIndex === index + 1) currentTrackIndex--;
            updateTrackDisplay();
            renderTrackList();
        }

        function changeTrack(direction) {
            if (loadedTracks.length === 0) return;
            musicPlayer.pause();
            sabiPlayer.pause();
            currentTrackIndex += direction;
            if (currentTrackIndex < 0) currentTrackIndex = loadedTracks.length - 1;
            if (currentTrackIndex >= loadedTracks.length) currentTrackIndex = 0;
            updateTrackDisplay();
            renderTrackList();
        }

        const playBtn = document.getElementById('btn-manual-play');
        playBtn.addEventListener('click', () => {
            if (loadedTracks.length === 0) return;
            sabiPlayer.pause();
            if (musicPlayer.paused) {
                musicPlayer.play();
                playBtn.innerText = "イントロ 一時停止";
                playBtn.style.background = "#e74c3c";
            } else {
                musicPlayer.pause();
                playBtn.innerText = "イントロ 再生";
                playBtn.style.background = "#2ecc71";
            }
        });

        const sabiPlayBtn = document.getElementById('btn-sabi-play');
        sabiPlayBtn.addEventListener('click', () => {
            if (loadedSabiTracks.length === 0 || !loadedSabiTracks[currentTrackIndex]) {
                alert("この曲のサビ音源が読み込まれていません");
                return;
            }
            musicPlayer.pause();
            
            if (sabiPlayer.paused) {
                const targetSrc = URL.createObjectURL(loadedSabiTracks[currentTrackIndex]);
                if (!sabiPlayer.src || sabiPlayer.dataset.trackIndex !== String(currentTrackIndex)) {
                    sabiPlayer.src = targetSrc;
                    sabiPlayer.dataset.trackIndex = currentTrackIndex;
                    sabiPlayer.currentTime = 0;
                }
                sabiPlayer.play().catch(e => console.log("再生失敗: ", e));
                sabiPlayBtn.innerText = "サビ 一時停止";
                sabiPlayBtn.style.background = "#d35400";
            } else {
                sabiPlayer.pause();
                sabiPlayBtn.innerText = "サビを再生";
                sabiPlayBtn.style.background = "#f39c12";
            }
        });

        musicPlayer.addEventListener('play', () => {
            playBtn.innerText = "イントロ 一時停止";
            playBtn.style.background = "#e74c3c";
        });
        musicPlayer.addEventListener('pause', () => {
            playBtn.innerText = "イントロ 再生";
            playBtn.style.background = "#2ecc71";
        });
        
        sabiPlayer.addEventListener('play', () => {
            sabiPlayBtn.innerText = "サビ 一時停止";
            sabiPlayBtn.style.background = "#d35400";
        });
        sabiPlayer.addEventListener('pause', () => {
            sabiPlayBtn.innerText = "サビを再生";
            sabiPlayBtn.style.background = "#f39c12";
        });

        document.getElementById('btn-skip-back').addEventListener('click', () => {
            if (!musicPlayer.paused) {
                musicPlayer.currentTime = Math.max(0, musicPlayer.currentTime - 10);
            } else if (!sabiPlayer.paused) {
                sabiPlayer.currentTime = Math.max(0, sabiPlayer.currentTime - 10);
            }
        });
        document.getElementById('btn-skip-forward').addEventListener('click', () => {
            if (!musicPlayer.paused) {
                musicPlayer.currentTime = Math.min(musicPlayer.duration, musicPlayer.currentTime + 10);
            } else if (!sabiPlayer.paused) {
                sabiPlayer.currentTime = Math.min(sabiPlayer.duration, sabiPlayer.currentTime + 10);
            }
        });

        function playSound(type) {
            if (!enableSound) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'ping') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1760, now+0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.4);
                osc.start(); osc.stop(now+0.4);
            }
        }

        let currentQueue = [];
        let currentIndex = 0;

        ref.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const queue = data.queue || [];
            const idx = data.current_index || 0;
            currentQueue = queue;
            currentIndex = idx;
            
            const listDiv = document.getElementById('ranking-list');
            const judgeArea = document.getElementById('judge-area');

            if (queue.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center; color:#7f8c8d; line-height: 60px;">待機中</div>';
                judgeArea.style.display = 'none';
            } else {
                let html = '';
                queue.forEach((name, i) => {
                    let className = 'rank-item';
                    let status = '';
                    if (i === idx) {
                        className += ' active';
                        status = '回答中';
                    }
                    if (i < idx) {
                        className += ' ng';
                        status = '不正解';
                    }
                    html += `<div class="${className}"><span class="rank-badge">${i+1}番手</span><span>${name}</span><span>${status}</span></div>`;
                });
                listDiv.innerHTML = html;
                
                if (idx < queue.length) {
                    judgeArea.style.display = 'flex';
                } else {
                    judgeArea.style.display = 'none';
                }
            }
            
            if (typeof window.lastLen !== 'undefined' && window.lastLen !== null && queue.length > window.lastLen) {
                playSound('ping');
                musicPlayer.pause();
                sabiPlayer.pause();
            }
            window.lastLen = queue.length;
        });

        document.getElementById('btn-ok').addEventListener('click', () => {
            musicPlayer.pause();
            sabiPlayer.pause();
            ref.update({ judgment: 'correct' });
        });

        document.getElementById('btn-ng').addEventListener('click', () => {
            musicPlayer.pause();
            sabiPlayer.pause();
            ref.update({ judgment: 'incorrect' });
            
            setTimeout(() => {
                ref.transaction((data) => {
                    if (data) {
                        data.judgment = null;
                        data.current_index = (data.current_index || 0) + 1;
                    }
                    return data;
                });
                
                if (loadedTracks.length > 0 && musicPlayer.paused && currentIndex < currentQueue.length) {
                    musicPlayer.play().catch(e => console.log("再生失敗: ", e));
                }
            }, 1200);
        });

        document.getElementById('start').addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            window.lastLen = 0;
            sabiPlayer.pause();
            
            ref.once('value').then((snapshot) => {
                const data = snapshot.val() || {};
                if (data.judgment === 'correct') {
                    changeTrack(1);
                }
                
                if (loadedTracks.length > 0) {
                    const file = loadedTracks[currentTrackIndex];
                    musicPlayer.src = URL.createObjectURL(file);
                    musicPlayer.currentTime = 0;
                    musicPlayer.play().catch(e => console.log("再生失敗: ", e));
                }

                ref.set({ state: 'open', queue: [], current_index: 0, judgment: null });
            });
        });

        document.getElementById('reset').addEventListener('click', () => {
            musicPlayer.pause();
            sabiPlayer.pause();
            ref.set({ state: 'closed', queue: [], current_index: 0, judgment: null });
        });

        db.ref(".info/connected").on("value", (snap) => {
            const lamp = document.getElementById('lamp');
            if(snap.val()) { lamp.style.background = "#2ecc71"; document.getElementById('conn-status').innerText = "接続完了"; }
            else { lamp.style.background = "#ccc"; document.getElementById('conn-status').innerText = "未接続"; }
        });
    </script>
</body>
</html>
